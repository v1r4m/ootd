# 프로덕션 스택: app(php-fpm) + web(Caddy).
# 이 호스트엔 이미 공용 리버스 프록시(eta-caddy)가 80/443 을 점유하고 있어,
# 우리 web 은 호스트 포트를 열지 않고 공용 프록시와 같은 네트워크에 붙는다.
# 공용 프록시가 ootd.viram.dev 를 받아 http://ootd-web:80 으로 넘긴다.
#
# 코드는 호스트 디렉터리를 바인드마운트 → SQLite/아바타가 호스트에 남아 백업이 쉽다.
#
# 사용:  ./deploy.sh        (pull → build → install → migrate → up)
# 로그:  docker compose -f compose.prod.yaml logs -f

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ootd-app:latest
    restart: unless-stopped
    # 호스트 사용자 uid/gid 로 실행 (deploy.sh 가 자동 주입) → 바인드마운트 권한 확보
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    env_file: .env
    # 컨테이너 사용자에 home 이 없어 composer/artisan 이 쓰기 가능한 HOME 을 필요로 한다
    environment:
      HOME: /tmp
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    volumes:
      - ./:/var/www/html
    networks:
      - internal
    expose:
      - "9000"

  web:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./:/var/www/html:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      internal: {}
      # 공용 프록시(eta-caddy)가 이 별칭으로 우리 web 에 접근한다
      proxy:
        aliases:
          - ootd-web

networks:
  internal:
  # 기존 공용 프록시가 사용하는 네트워크를 외부 네트워크로 참조.
  # .env 의 PROXY_NETWORK 에 실제 네트워크 이름을 넣는다 (예: eta_default).
  proxy:
    external: true
    name: ${PROXY_NETWORK:-eta_default}

volumes:
  caddy_data:
  caddy_config:
