; OOTD 프로덕션 PHP 설정
memory_limit = 256M

; 에러를 컨테이너 로그(stderr)로 보내 docker logs 로 보이게 한다
log_errors = On
display_errors = Off
error_log = /proc/self/fd/2
; 아바타 생성이 동기 처리라 Gemini 응답(10~20초)을 기다린다. 넉넉히.
max_execution_time = 120
upload_max_filesize = 8M
post_max_size = 8M
expose_php = Off

; OPcache (validate_timestamps=1: git pull 후 코드 변경을 자동 반영)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
